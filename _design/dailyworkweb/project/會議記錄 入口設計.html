<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>會議記錄 · 入口設計探索</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#f0eee9; }
  body { font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; color:#1a1a1f; overflow:hidden; }
  #root { height:100vh; width:100vw; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="screens/variation-a.jsx"></script>
<script type="text/babel" src="screens/variation-b.jsx"></script>
<script type="text/babel" src="screens/variation-c.jsx"></script>
<script type="text/babel" src="screens/voiceprint.jsx"></script>

<script type="text/babel" data-presets="env,react">
// ── Wrap each screen in an IOSDevice at a consistent size ──
const DEVICE_W = 390;
const DEVICE_H = 844;

function Phone({ children }) {
  // IOSDevice's built-in status bar is absolutely positioned above content;
  // screens here draw their own backgrounds so we pass the children straight
  // through. Title omitted — each screen handles its own header.
  return (
    <div style={{ padding: 0 }}>
      <IOSDevice width={DEVICE_W} height={DEVICE_H}>
        {children}
      </IOSDevice>
    </div>
  );
}

// Artboards are sized to contain phone + its 40px-ish external shadow
const ART_W = DEVICE_W + 40;
const ART_H = DEVICE_H + 40;

function PhoneArtboard({ children }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: '#fff',
    }}>
      <Phone>{children}</Phone>
    </div>
  );
}

// ── Intro / brief card — 圓潤版 ──
function BriefCard() {
  return (
    <div style={{
      width: 720, padding: '36px 40px', background: PAPER, borderRadius: 32,
      fontFamily: '-apple-system, "SF Pro Text", system-ui',
      color: INK, lineHeight: 1.55,
      boxShadow: '0 1px 0 rgba(0,0,0,0.02), 0 24px 48px -28px rgba(0,0,0,0.15)',
    }}>
      <div style={{ fontSize: 13, color: INK_MUTED, marginBottom: 10 }}>
        會議記錄 · 入口探索
      </div>
      <div style={{ fontSize: 30, fontWeight: 600, letterSpacing: -0.8, marginBottom: 14, lineHeight: 1.15 }}>
        圓潤、克制、<br/>只問一件事。
      </div>
      <div style={{ fontSize: 13.5, color: INK_MUTED, maxWidth: 560 }}>
        三個方向各自用圓角與留白，讓入口只聚焦在「要不要現在開始錄音」。
        其他細節都先收起來。
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginTop: 26 }}>
        {[
          { k: 'A', t: '極簡圓鈕', d: '只有一顆大錄音鈕 + 一條最近會議。' },
          { k: 'B', t: '深色卡片', d: '一張主卡邀請你開始，下方兩條摘要。' },
          { k: 'C', t: '對話一問', d: '深色頁面只問一句話，兩個圓角按鈕。' },
        ].map(v => (
          <div key={v.k} style={{
            padding: 18, background: CANVAS, borderRadius: 22,
          }}>
            <div style={{ fontSize: 12, color: INK_MUTED, marginBottom: 4 }}>{v.k}</div>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6, letterSpacing: -0.2 }}>
              {v.t}
            </div>
            <div style={{ fontSize: 12, color: INK_MUTED, lineHeight: 1.55 }}>
              {v.d}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      {/* Intro brief as a standalone section */}
      <DCSection id="intro" title="會議記錄 App — 入口設計探索" subtitle="3 個入口方向 + 聲紋註冊流程（iPhone · 390×844）">
        <DCArtboard id="brief" label="Design Brief" width={820} height={420}>
          <div style={{ padding: 20, height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <BriefCard/>
          </div>
        </DCArtboard>
      </DCSection>

      {/* Three home-screen variations side by side */}
      <DCSection id="home" title="首頁 / Dashboard" subtitle="優雅 × 簡約">
        <DCArtboard id="a" label="A · 紙感 Masthead" width={ART_W} height={ART_H}>
          <PhoneArtboard><VariationA/></PhoneArtboard>
        </DCArtboard>
        <DCArtboard id="b" label="B · 深色主卡" width={ART_W} height={ART_H}>
          <PhoneArtboard><VariationB/></PhoneArtboard>
        </DCArtboard>
        <DCArtboard id="c" label="C · 一問兩答" width={ART_W} height={ART_H}>
          <PhoneArtboard><VariationC/></PhoneArtboard>
        </DCArtboard>
      </DCSection>

      {/* Voiceprint enrollment — shared by all three */}
      <DCSection id="voiceprint" title="聲紋註冊" subtitle="三個方向共用。5 句標準句，約 1 分鐘完成">
        <DCArtboard id="vp" label="標準句錄製" width={ART_W} height={ART_H}>
          <PhoneArtboard><VoiceprintScreen/></PhoneArtboard>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
